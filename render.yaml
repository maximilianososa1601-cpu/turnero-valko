services:
  # El Cerebro (Backend)
  - type: web
    name: backend-valko
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: valko-secretos

  # La Pantalla (Frontend)
  - type: web
    name: frontend-valko
    runtime: static
    publishDir: .  # El punto significa "acá mismo", donde están los archivos

envVarGroups:
  - name: valko-secretos
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA_CONTENT
        sync: false
      - key: JWT_SECRET
        sync: false
